<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Reserve a Table — Maison Noir</title>
  <meta name="description" content="Reserve your table at Maison Noir — three boutique cafes across New York City.">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body id="reservation-page">
  <div id="nav-mount"></div>

  <header class="page-header">
    <div class="container">
      <span class="eyebrow">Reservation</span>
      <h1 id="reservation-title"></h1>
      <p id="reservation-subtitle"></p>
    </div>
  </header>

  <section>
    <div class="container">
      <div class="reservation-wrap">
        <div class="reservation-image reveal">
          <img id="reservation-image" alt="Reserve at Maison Noir">
        </div>
        <div class="form-card reveal">
          <form id="reservation-form" novalidate>
            <div class="form-row">
              <div class="form-group">
                <label for="name">Full Name</label>
                <input id="name" name="name" type="text" placeholder="Your name">
              </div>
              <div class="form-group">
                <label for="phone">Phone</label>
                <input id="phone" name="phone" type="tel" placeholder="+1 (555) 555-0000">
              </div>
            </div>
            <div class="form-row">
              <div class="form-group">
                <label for="date">Date</label>
                <input id="date" name="date" type="date">
              </div>
              <div class="form-group">
                <label for="time">Time</label>
                <input id="time" name="time" type="time">
              </div>
            </div>
            <div class="form-row">
              <div class="form-group">
                <label for="guests">Guests</label>
                <select id="guests" name="guests">
                  <option value="">Select party size</option>
                  <option>1 guest</option><option>2 guests</option><option>3 guests</option>
                  <option>4 guests</option><option>5 guests</option><option>6 guests</option>
                  <option>7+ guests</option>
                </select>
              </div>
              <div class="form-group">
                <label for="location">Location</label>
                <select id="location" name="location">
                  <option>Maison Noir — SoHo</option>
                  <option>Maison Noir — West Village</option>
                  <option>Maison Noir — Brooklyn</option>
                </select>
              </div>
            </div>
            <div class="form-group full">
              <label for="notes">Notes (optional)</label>
              <textarea id="notes" name="notes" rows="3" placeholder="Allergies, special occasion, seating preference…"></textarea>
            </div>
            <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center">Confirm Reservation <span class="arrow">→</span></button>
            <div class="form-msg" id="reservation-msg"></div>
          </form>
        </div>
      </div>
    </div>
  </section>

  <div id="footer-mount"></div>

  <script src="config/buttons.js"></script>
  <script src="config/text.js"></script>
  <script src="config/messages.js"></script>
  <script src="config/images.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
