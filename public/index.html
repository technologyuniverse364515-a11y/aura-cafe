<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Maison Noir — Crafted Coffee. Curated Experience.</title>
  <meta name="description" content="An independent New York coffee house. House-roasted single-origin espresso, live jazz nights, and three boutique cafes across NYC.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body id="home">
  <div id="nav-mount"></div>

  <section class="hero" id="hero"></section>
  <div class="marquee"><div class="marquee-track" id="marquee-track"></div></div>

  <section class="container">
    <div class="story" id="story"></div>
  </section>

  <section class="container">
    <div class="feature-split" id="best-seller"></div>
  </section>

  <section class="container">
    <div class="feature-split flip" id="seasonal"></div>
  </section>

  <section>
    <div class="container">
      <div class="section-head reveal">
        <span class="eyebrow">The Menu</span>
        <h2>Curated From the Bar</h2>
        <p>A glimpse of the coffees and small plates our regulars return for.</p>
      </div>
      <div class="menu-grid" id="menu-grid"></div>
    </div>
  </section>

  <section>
    <div class="container">
      <div class="section-head reveal">
        <span class="eyebrow">Inside Maison Noir</span>
        <h2>A Space Built for Slowing Down</h2>
      </div>
      <div class="gallery-grid" id="gallery-grid"></div>
    </div>
  </section>

  <section>
    <div class="container">
      <div class="section-head reveal">
        <span class="eyebrow">Loved by New Yorkers</span>
        <h2>Words From Our Regulars</h2>
      </div>
      <div class="testimonials-grid" id="testimonials"></div>
    </div>
  </section>

  <section id="newsletter"></section>

  <section>
    <div class="container">
      <div class="section-head reveal">
        <span class="eyebrow">FAQ</span>
        <h2>Questions, Answered</h2>
      </div>
      <div class="faq-list" id="faq-list"></div>
    </div>
  </section>

  <div id="footer-mount"></div>

  <script src="config/buttons.js"></script>
  <script src="config/text.js"></script>
  <script src="config/messages.js"></script>
  <script src="config/images.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
